<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Station Control Center — JLG Jefferson City</title>
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        scc: {
          orange: '#E87722', orangeDk: '#C9631A',
          dark: 'rgb(var(--c-head) / <alpha-value>)', bg: 'rgb(var(--c-bg) / <alpha-value>)', card: 'rgb(var(--c-card) / <alpha-value>)',
          border: 'rgb(var(--c-border) / <alpha-value>)', borderLt: 'rgb(var(--c-borderlt) / <alpha-value>)',
          text: 'rgb(var(--c-text) / <alpha-value>)', muted: 'rgb(var(--c-muted) / <alpha-value>)',
          green: '#2F9E44', amber: '#E8920C', red: '#E03131', teal: '#0C8599', purple: '#6741D9'
        }
      },
      fontFamily: {
        sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'],
        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace']
      },
      boxShadow: { card: '0 1px 3px rgba(27,33,43,0.08), 0 1px 2px rgba(27,33,43,0.04)' }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" />
<style>
  :root{--c-bg:244 246 249;--c-card:255 255 255;--c-border:216 222 231;--c-borderlt:232 236 242;--c-text:27 33 43;--c-muted:91 102 117;--c-head:27 33 43}
  .dark{--c-bg:8 11 16;--c-card:20 25 33;--c-border:44 52 65;--c-borderlt:32 39 50;--c-text:224 231 240;--c-muted:143 154 171;--c-head:12 15 21}
  .dark .shadow-card{box-shadow:0 1px 0 0 rgba(255,255,255,.03) inset,0 6px 20px -6px rgba(0,0,0,.6);border-color:rgb(var(--c-border))}
  .dark .lift{box-shadow:0 8px 28px -10px rgba(0,0,0,.7)}
  html,body{margin:0}
  *{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:rgb(var(--c-bg));color:rgb(var(--c-text))}
  .ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-feature-settings:'liga';font-feature-settings:'liga'}
  a{color:#E87722}a:hover{color:#C9631A}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgb(var(--c-border));border-radius:6px;border:2px solid rgb(var(--c-bg))}
  ::-webkit-scrollbar-thumb:hover{background:rgb(var(--c-muted)/.6)}
  input:focus,textarea:focus,select:focus{outline:none}
  .no-sb::-webkit-scrollbar{display:none}.no-sb{scrollbar-width:none}
  @keyframes sccToastIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes sccGlow{0%,100%{box-shadow:0 0 0 0 rgba(232,119,34,.45)}50%{box-shadow:0 0 0 6px rgba(232,119,34,0)}}
  @keyframes sccSlideIn{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
  @keyframes sccPopIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

    <circle cx="1060" cy="305" r="8" fill="#2F9E44"/>

</body>
</html>
